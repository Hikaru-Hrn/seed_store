<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дом Семян - Каталог</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-green-600 p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">🌱 Дом Семян</h1>
            <button onclick="toggleCart()" class="bg-green-700 hover:bg-green-800 px-4 py-2 rounded-lg font-semibold">
                🛒 Корзина (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        <h2 class="text-xl font-bold text-gray-800 mb-6">Каталог товаров</h2>
        <div id="catalog" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

        <div id="pagination" class="flex justify-center items-center mt-10 space-x-4"></div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center">
        <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">Ваша корзина</h2>
                <button onclick="toggleCart()" class="text-red-500 font-bold text-xl">&times;</button>
            </div>
            <ul id="cart-items" class="mb-4 space-y-2 border-b pb-4"></ul>
            <p class="font-bold text-lg mb-4 text-right">Итого: <span id="cart-total">0</span> руб.</p>
            <div class="space-y-3">
                <input type="text" id="customer-name" placeholder="Ваше Имя" class="w-full border p-2 rounded">
                <input type="text" id="customer-phone" placeholder="Телефон (+7... / 8...)" class="w-full border p-2 rounded">
                <button onclick="submitOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded">Оформить заказ</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const limit = 18; // Количество товаров на одной странице
        let totalPages = 1;

        async function loadProducts(page = 1) {
            currentPage = page;
            const skip = (page - 1) * limit;

            // 1. Получаем общее количество товаров для расчета страниц
            const countRes = await fetch('/api/products/count');
            const countData = await countRes.json();
            totalPages = Math.ceil(countData.total / limit);

            // 2. Получаем товары для текущей страницы
            const res = await fetch(`/api/products/?skip=${skip}&limit=${limit}`);
            const products = await res.json();

            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';

            products.forEach(p => {
                const img = p.image_url ? p.image_url : 'https://via.placeholder.com/300x200?text=Нет+фото';
                
                // Экранируем кавычки, чтобы HTML не ломался при добавлении в корзину
                const safeTitle = p.title.replace(/'/g, "&#39;").replace(/"/g, "&quot;");

                catalog.innerHTML += `
                    <div class="bg-white rounded-lg shadow-md p-5 flex flex-col justify-between">
                        <div>
                            <img src="${img}" alt="${safeTitle}" class="w-full h-40 object-cover rounded mb-4">
                            <h3 class="text-lg font-bold text-gray-800">${p.title}</h3>
                            <p class="text-gray-600 text-sm mt-2 h-16 overflow-hidden">${p.description}</p>
                            <p class="text-green-600 font-bold text-xl mt-4">${p.price} руб.</p>
                            <p class="text-xs text-gray-500 mt-1">В наличии: ${p.stock_quantity} шт.</p>
                        </div>
                        <div class="mt-4 flex gap-2">
                            <input type="number" id="qty-${p.id}" value="1" min="1" max="${p.stock_quantity}" class="w-16 border rounded p-2 text-center">
                            <button onclick="addToCart(${p.id}, '${safeTitle}', ${p.price})" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 rounded">
                                В корзину
                            </button>
                        </div>
                    </div>
                `;
            });

            // 3. Отрисовываем кнопки страниц
            renderPagination();
        }

        // Функция отрисовки кнопок "Вперед / Назад"
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            if (totalPages <= 1) return; // Если страница всего одна, кнопки не нужны

            // Кнопка "Назад"
            if (currentPage > 1) {
                pagination.innerHTML += `<button onclick="loadProducts(${currentPage - 1})" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 font-bold transition-colors">← Назад</button>`;
            } else {
                pagination.innerHTML += `<button disabled class="px-4 py-2 bg-gray-300 text-gray-500 rounded font-bold cursor-not-allowed">← Назад</button>`;
            }

            // Номер страницы
            pagination.innerHTML += `<span class="font-bold text-gray-700">Страница ${currentPage} из ${totalPages}</span>`;

            // Кнопка "Вперед"
            if (currentPage < totalPages) {
                pagination.innerHTML += `<button onclick="loadProducts(${currentPage + 1})" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 font-bold transition-colors">Вперед →</button>`;
            } else {
                pagination.innerHTML += `<button disabled class="px-4 py-2 bg-gray-300 text-gray-500 rounded font-bold cursor-not-allowed">Вперед →</button>`;
            }
        }

        function addToCart(id, title, price) {
            const qty = parseInt(document.getElementById(`qty-${id}`).value);
            const existing = cart.find(i => i.product_id === id);
            if (existing) existing.quantity += qty;
            else cart.push({ product_id: id, title, price, quantity: qty });
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, i) => sum + i.quantity, 0);
            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.quantity;
                list.innerHTML += `<li class="flex justify-between text-sm">
                    <span>${item.title} (x${item.quantity})</span><span class="font-bold">${item.price * item.quantity} руб.</span>
                </li>`;
            });
            document.getElementById('cart-total').innerText = total;
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        async function submitOrder() {
            if (cart.length === 0) return alert('Корзина пуста!');
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;

            // ВАЛИДАЦИЯ ТЕЛЕФОНА
            const phoneRegex = /^(\+7|7|8)?[\s\-]?\(?[489][0-9]{2}\)?[\s\-]?[0-9]{3}[\s\-]?[0-9]{2}[\s\-]?[0-9]{2}$/;
            if (!phoneRegex.test(phone)) {
                return alert('Пожалуйста, введите корректный российский номер телефона!');
            }

            const res = await fetch('/api/orders/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ customer_name: name, customer_phone: phone, items: cart.map(i => ({ product_id: i.product_id, quantity: i.quantity })) })
            });

            if (res.ok) {
                alert('Заказ успешно оформлен!');
                cart = [];
                updateCartUI();
                toggleCart();
                loadProducts();
            } else {
                alert('Ошибка при оформлении заказа');
            }
        }
        loadProducts();
    </script>
</body>
</html>
