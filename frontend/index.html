<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дом Семян - Каталог</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-green-600 p-4 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">🌱 Дом Семян</h1>
            <div>
                <a href="/admin" class="text-green-200 hover:text-white mr-4 text-sm font-semibold">Админка</a>
                <button onclick="toggleCart()" class="bg-green-700 hover:bg-green-800 px-4 py-2 rounded-lg font-semibold flex items-center transition">
                    🛒 Корзина (<span id="cart-count">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4 min-h-screen">
        <h2 class="text-xl font-bold text-gray-800 mb-6">Каталог товаров</h2>
        <div class="mb-6 flex gap-2 max-w-2xl">
            <input type="text" id="search-input" placeholder="Поиск по названию (например, 'Кукуруза')..."
                   class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-green-500 outline-none shadow-sm"
                   onkeypress="if(event.key === 'Enter') doSearch()">
            <button onclick="doSearch()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold shadow transition-colors">
                Искать
            </button>
        </div>
        <div id="catalog" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>

        <div id="pagination" class="flex justify-center items-center mt-10 space-x-4 mb-10"></div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center z-50">
        <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-md max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">Ваша корзина</h2>
                <button onclick="toggleCart()" class="text-gray-400 hover:text-red-600 transition font-bold text-3xl">&times;</button>
            </div>

            <ul id="cart-items" class="mb-4 space-y-2 border-b pb-4 overflow-y-auto flex-1 pr-2 scrollbar-thin"></ul>
            <p class="font-bold text-xl mb-4 text-right text-green-700">Итого: <span id="cart-total">0</span> руб.</p>

            <div class="space-y-3 mt-auto">
                <input type="text" id="customer-name" placeholder="Ваше Имя" class="w-full border p-2 rounded focus:ring-2 focus:ring-green-500 outline-none">
                <input type="text" id="customer-phone" placeholder="Телефон (+7... / 8...)" class="w-full border p-2 rounded focus:ring-2 focus:ring-green-500 outline-none">
                <button onclick="submitOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded transition shadow-md">Оформить заказ</button>
            </div>
        </div>
    </div>

    <script>
        let cart = [];
        window.currentStoreProducts = [];

        let currentPage = 1;
        const limit = 12;
        let totalPages = 1;

        // НОВАЯ ПЕРЕМЕННАЯ ДЛЯ ПОИСКА
        let currentSearch = "";

        // НОВАЯ ФУНКЦИЯ ПОИСКА
        function doSearch() {
            currentSearch = document.getElementById('search-input').value.trim();
            loadProducts(1); // При новом поиске всегда начинаем с 1-й страницы
        }

        async function loadProducts(page = 1) {
            currentPage = page;
            const skip = (page - 1) * limit;

            try {
                // Формируем URL-адреса с учетом того, введен ли текст в поиск
                let urlCount = '/api/products/count';
                let urlProducts = `/api/products/?skip=${skip}&limit=${limit}`;

                if (currentSearch) {
                    urlCount += `?search=${encodeURIComponent(currentSearch)}`;
                    urlProducts += `&search=${encodeURIComponent(currentSearch)}`;
                }

                const countRes = await fetch(urlCount);
                const countData = await countRes.json();
                totalPages = Math.ceil(countData.total / limit);

                const res = await fetch(urlProducts);
                window.currentStoreProducts = await res.json();

                const catalog = document.getElementById('catalog');
                catalog.innerHTML = '';

                if (window.currentStoreProducts.length === 0) {
                    catalog.innerHTML = `<p class="text-gray-500 col-span-full font-bold text-lg">По запросу «${currentSearch}» ничего не найдено.</p>`;
                }

                window.currentStoreProducts.forEach(p => {
                    const img = p.image_url ? p.image_url : 'https://via.placeholder.com/300x200?text=Нет+фото';
                    const safeAlt = p.title.replace(/"/g, '&quot;');

                    catalog.innerHTML += `
                        <div class="bg-white rounded-xl shadow-md hover:shadow-lg transition-shadow p-5 flex flex-col justify-between">
                            <div>
                                <img src="${img}" alt="${safeAlt}" class="w-full h-48 object-cover rounded-lg mb-4 border">
                                <h3 class="text-lg font-bold text-gray-800 leading-tight">${p.title}</h3>
                                <p class="text-gray-500 text-sm mt-2 h-16 overflow-y-auto pr-1 text-justify scrollbar-thin">${p.description}</p>
                                <p class="text-green-600 font-extrabold text-2xl mt-4">${p.price} ₽</p>
                                <p class="text-xs font-semibold ${p.stock_quantity > 0 ? 'text-gray-500' : 'text-red-500'} mt-1">
                                    ${p.stock_quantity > 0 ? `В наличии: ${p.stock_quantity} шт.` : 'Нет в наличии'}
                                </p>
                            </div>
                            <div class="mt-5 flex gap-2">
                                <input type="number" id="qty-${p.id}" value="1" min="1" max="${p.stock_quantity}" ${p.stock_quantity === 0 ? 'disabled' : ''} class="w-16 border rounded-lg p-2 text-center font-bold text-gray-700 outline-none focus:ring-2 focus:ring-blue-500">
                                <button onclick="addToCart(${p.id})" ${p.stock_quantity === 0 ? 'disabled' : ''} class="flex-1 bg-blue-500 hover:bg-blue-600 disabled:bg-gray-400 text-white font-bold py-2 rounded-lg transition-colors shadow">
                                    В корзину
                                </button>
                            </div>
                        </div>
                    `;
                });

                renderPagination();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                console.error("Ошибка загрузки:", error);
            }
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            if (totalPages <= 1) return;

            if (currentPage > 1) {
                pagination.innerHTML += `<button onclick="loadProducts(${currentPage - 1})" class="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-bold transition-colors shadow">← Назад</button>`;
            } else {
                pagination.innerHTML += `<button disabled class="px-5 py-2 bg-gray-300 text-gray-500 rounded-lg font-bold cursor-not-allowed">← Назад</button>`;
            }

            pagination.innerHTML += `<span class="font-bold text-gray-700 bg-white px-4 py-2 rounded-lg shadow-sm border">Страница ${currentPage} из ${totalPages}</span>`;

            if (currentPage < totalPages) {
                pagination.innerHTML += `<button onclick="loadProducts(${currentPage + 1})" class="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-bold transition-colors shadow">Вперед →</button>`;
            } else {
                pagination.innerHTML += `<button disabled class="px-5 py-2 bg-gray-300 text-gray-500 rounded-lg font-bold cursor-not-allowed">Вперед →</button>`;
            }
        }

        function addToCart(id) {
            const product = window.currentStoreProducts.find(p => p.id === id);
            if (!product) return;

            const qtyInput = document.getElementById(`qty-${id}`);
            const qty = parseInt(qtyInput.value);

            if (qty > product.stock_quantity) {
                alert(`Доступно только ${product.stock_quantity} шт.!`);
                qtyInput.value = product.stock_quantity;
                return;
            }

            const existing = cart.find(i => i.product_id === id);
            if (existing) {
                if (existing.quantity + qty > product.stock_quantity) {
                     alert(`Нельзя добавить больше, чем есть на складе!`);
                     return;
                }
                existing.quantity += qty;
            } else {
                cart.push({ product_id: id, title: product.title, price: product.price, quantity: qty });
            }

            updateCartUI();

            const btn = qtyInput.nextElementSibling;
            const originalText = btn.innerText;
            btn.innerText = "✓ Добавлено";
            btn.classList.add("bg-green-500", "hover:bg-green-600");
            btn.classList.remove("bg-blue-500", "hover:bg-blue-600");
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove("bg-green-500", "hover:bg-green-600");
                btn.classList.add("bg-blue-500", "hover:bg-blue-600");
            }, 1000);
        }

        // НОВАЯ ФУНКЦИЯ: Удаление товара из корзины
        function removeFromCart(id) {
            // Оставляем в корзине только те товары, ID которых не совпадает с удаляемым
            cart = cart.filter(item => item.product_id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, i) => sum + i.quantity, 0);

            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                // Добавлена кнопка удаления (крестик) в правую часть элемента списка
                list.innerHTML += `
                <li class="flex justify-between items-center text-sm p-2 bg-gray-50 rounded border group">
                    <div class="flex-1 pr-2">
                        <span class="font-bold text-gray-800">${item.title}</span>
                        <div class="text-xs text-gray-500">${item.price} ₽ x ${item.quantity} шт.</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-extrabold text-green-700 whitespace-nowrap">${item.price * item.quantity} ₽</span>
                        <button onclick="removeFromCart(${item.product_id})" title="Удалить из корзины" class="text-gray-400 hover:text-red-500 hover:bg-red-50 p-1 rounded transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </li>`;
            });
            document.getElementById('cart-total').innerText = total;

            // Если корзина пуста, выводим сообщение
            if (cart.length === 0) {
                list.innerHTML = '<li class="text-center text-gray-500 py-4">Корзина пока пуста</li>';
            }
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        async function submitOrder() {
            if (cart.length === 0) return alert('Корзина пуста!');
            const name = document.getElementById('customer-name').value.trim();
            const phone = document.getElementById('customer-phone').value.trim();

            if (!name) return alert('Пожалуйста, введите ваше имя.');

            const phoneRegex = /^(\+7|7|8)?[\s\-]?\(?[489][0-9]{2}\)?[\s\-]?[0-9]{3}[\s\-]?[0-9]{2}[\s\-]?[0-9]{2}$/;
            if (!phoneRegex.test(phone)) {
                return alert('Пожалуйста, введите корректный российский номер телефона!');
            }

            const res = await fetch('/api/orders/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    customer_name: name,
                    customer_phone: phone,
                    items: cart.map(i => ({ product_id: i.product_id, quantity: i.quantity }))
                })
            });

            if (res.ok) {
                alert('🎉 Заказ успешно оформлен!');
                cart = [];
                updateCartUI();
                toggleCart();
                document.getElementById('customer-name').value = '';
                document.getElementById('customer-phone').value = '';
                loadProducts(currentPage);
            } else {
                alert('Ошибка при оформлении заказа. Возможно, товар закончился.');
            }
        }

        loadProducts();
    </script>
</body>
</html>
