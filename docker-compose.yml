version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: seed_store_db
    restart: always
    environment:
      MYSQL_DATABASE: seed_store_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  api:
    build: ./backend
    container_name: seed_store_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql+pymysql://user:password@db:3306/seed_store_db
    volumes:
      # Пробрасываем папку с фронтендом внутрь контейнера,
      # чтобы FastAPI мог раздавать файл index.html
      - ./frontend:/frontend

volumes:
  db_data: